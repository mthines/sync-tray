name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  # Betas are published on demand via a `/beta` comment on a PR — never
  # automatically on every push — so a run of macOS build + notarization
  # only happens when explicitly requested.
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force release even if no changes detected'
        type: boolean
        default: false
      dry_run:
        description: 'Dry run (no publishing)'
        type: boolean
        default: false

permissions:
  actions: read
  contents: read

concurrency:
  # Isolate on-demand betas from PR-push runs so a new push can't cancel a
  # beta that is mid-notarization.
  group: ${{ github.event_name == 'issue_comment' && format('ci-beta-{0}', github.event.issue.number) || format('ci-{0}', github.event.pull_request.number || github.ref) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ===========================================================================
  # detect-changes — determine event context (push vs PR vs /beta comment vs
  # dispatch), whether this run should publish a beta or stable, and skip
  # release-loop commits to avoid retriggering ourselves. Runs on Linux — this
  # is pure git/gh/jq work, no macOS needed.
  # ===========================================================================
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
    outputs:
      should_release: ${{ steps.detect.outputs.should_release }}
      is_beta: ${{ steps.detect.outputs.is_beta }}
      pr_number: ${{ steps.detect.outputs.pr_number }}
      base_ref: ${{ steps.detect.outputs.base_ref }}
      checkout_ref: ${{ steps.detect.outputs.checkout_ref }}
      run_build: ${{ steps.detect.outputs.run_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --tags --force

      - name: Detect context
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_RELEASE: ${{ inputs.force_release }}
          EVENT_NAME: ${{ github.event_name }}
          # Passed via env (never inlined into the script) so a crafted comment
          # body can't inject shell.
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_ASSOC: ${{ github.event.comment.author_association }}
          IS_PR_COMMENT: ${{ github.event.issue.pull_request != null }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          IS_BETA="false"
          PR_NUMBER=""
          BASE_REF="main"
          SHOULD_RELEASE="true"
          RUN_BUILD="true"
          CHECKOUT_REF="${{ github.sha }}"

          if [ "$EVENT_NAME" = "push" ]; then
            LAST_STABLE_TAG=$(git tag -l "v*" --sort=-version:refname | grep -E "^v[0-9]" | grep -v "beta" | head -n 1 || echo "")
            if [ -n "$LAST_STABLE_TAG" ]; then
              BASE_REF="$LAST_STABLE_TAG"
            else
              BASE_REF="HEAD~1"
            fi
            echo "::notice::Push to main — comparing against $BASE_REF"

          elif [ "$EVENT_NAME" = "pull_request" ]; then
            # PR pushes run the smoke build only. Betas are published on demand
            # via a `/beta` comment (see issue_comment below), never per-push.
            BASE_REF="origin/${{ github.base_ref }}"
            PR_NUMBER="${{ github.event.pull_request.number }}"
            CHECKOUT_REF="${{ github.event.pull_request.head.sha }}"
            SHOULD_RELEASE="false"
            echo "::notice::PR #$PR_NUMBER — smoke build only (comment /beta to publish a beta)"

          elif [ "$EVENT_NAME" = "issue_comment" ]; then
            # On-demand beta: an authorized `/beta` comment on an open PR.
            SHOULD_RELEASE="false"
            RUN_BUILD="false"
            TRIMMED=$(printf '%s' "$COMMENT_BODY" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            AUTHORIZED="false"
            case "$COMMENT_ASSOC" in
              OWNER|MEMBER|COLLABORATOR) AUTHORIZED="true" ;;
            esac

            if [ "$IS_PR_COMMENT" = "true" ] && [ "$TRIMMED" = "/beta" ] && [ "$AUTHORIZED" = "true" ]; then
              PR_JSON=$(gh pr view "$ISSUE_NUMBER" --json headRefOid,baseRefName,state 2>/dev/null || echo "")
              PR_STATE=$(echo "$PR_JSON" | jq -r '.state // "UNKNOWN"')
              if [ "$PR_STATE" = "OPEN" ]; then
                PR_NUMBER="$ISSUE_NUMBER"
                CHECKOUT_REF=$(echo "$PR_JSON" | jq -r '.headRefOid')
                BASE_REF="origin/$(echo "$PR_JSON" | jq -r '.baseRefName')"
                IS_BETA="true"
                SHOULD_RELEASE="true"
                RUN_BUILD="true"
                echo "::notice::/beta requested on PR #$PR_NUMBER — publishing beta from $CHECKOUT_REF"
              else
                echo "::notice::/beta ignored — PR #$ISSUE_NUMBER is not open"
              fi
            else
              echo "::notice::Ignoring comment (not an authorized /beta on an open PR)"
            fi

          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              LAST_STABLE_TAG=$(git tag -l "v*" --sort=-version:refname | grep -E "^v[0-9]" | grep -v "beta" | head -n 1 || echo "")
              if [ -n "$LAST_STABLE_TAG" ]; then
                BASE_REF="$LAST_STABLE_TAG"
              else
                BASE_REF="HEAD~1"
              fi
            else
              PR_INFO=$(gh pr view --json number,baseRefName,state 2>/dev/null || echo "")
              if [ -n "$PR_INFO" ]; then
                PR_STATE=$(echo "$PR_INFO" | jq -r '.state')
                if [ "$PR_STATE" = "OPEN" ]; then
                  PR_NUMBER=$(echo "$PR_INFO" | jq -r '.number')
                  BASE_REF="origin/$(echo "$PR_INFO" | jq -r '.baseRefName')"
                  IS_BETA="true"
                fi
              fi
              if [ -z "$PR_NUMBER" ]; then
                BASE_REF="HEAD~1"
              fi
            fi
            echo "::notice::workflow_dispatch — base=$BASE_REF"
          fi

          # Skip release-loop commits on push events (their tag was already pushed in a prior run)
          COMMIT_MSG=$(git log -1 --pretty=%s)
          if [ "$EVENT_NAME" = "push" ] && [ "$FORCE_RELEASE" != "true" ]; then
            if [[ "$COMMIT_MSG" =~ ^chore\(release\): ]] || [[ "$COMMIT_MSG" =~ ^feat\(cask\): ]]; then
              echo "::notice::Skipping release for commit: $COMMIT_MSG"
              SHOULD_RELEASE="false"
            fi
          fi

          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"
          echo "is_beta=$IS_BETA" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$CHECKOUT_REF" >> "$GITHUB_OUTPUT"
          echo "run_build=$RUN_BUILD" >> "$GITHUB_OUTPUT"

      - name: Acknowledge /beta request
        if: github.event_name == 'issue_comment' && steps.detect.outputs.run_build == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST \
            "/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content=eyes >/dev/null 2>&1 || true

  # ===========================================================================
  # test — compile the Debug build as a smoke test. SyncTray has no XCTest
  # target in its scheme (see project.json `test` target), so the build itself
  # is the gate. Single-arch (ONLY_ACTIVE_ARCH=YES) — a smoke build only needs
  # to prove it compiles; the universal binary is built in release-macos.
  # Skipped for /beta comments — the Release build there already validates
  # compilation, so a separate Debug build would just burn macOS minutes.
  # ===========================================================================
  test:
    needs: detect-changes
    if: needs.detect-changes.outputs.run_build == 'true' && github.event_name != 'issue_comment'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect-changes.outputs.checkout_ref }}

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .spm
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('**/*.xcodeproj/project.pbxproj') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build (Debug)
        run: |
          set -o pipefail
          xcodebuild -project SyncTray.xcodeproj \
            -scheme SyncTray \
            -destination 'platform=macOS' \
            -configuration Debug \
            -clonedSourcePackagesDirPath .spm \
            build \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO \
            | tail -30

  # ===========================================================================
  # version — calculate the next version from conventional commits and create
  # the git tag. Stable bumps Info.plist + commits chore(release) to main.
  # Beta only creates the annotated tag. Runs on Linux — git tag math plus a
  # portable sed plist edit, no macOS tooling required.
  # ===========================================================================
  version:
    needs: [detect-changes, test]
    if: |
      always() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      needs.detect-changes.outputs.should_release == 'true' &&
      !inputs.dry_run &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'issue_comment') ||
        (github.event_name == 'workflow_dispatch')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      created: ${{ steps.tag.outputs.created }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.detect-changes.outputs.checkout_ref }}
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Fetch all tags
        run: git fetch --tags --force

      - name: Calculate version
        id: version
        env:
          IS_BETA: ${{ needs.detect-changes.outputs.is_beta }}
          PR_NUMBER: ${{ needs.detect-changes.outputs.pr_number }}
          BASE_REF: ${{ needs.detect-changes.outputs.base_ref }}
          FORCE_RELEASE: ${{ inputs.force_release }}
        run: |
          PLIST="SyncTray/Info.plist"
          # Version source of truth: latest non-beta git tag, falling back to Info.plist
          LAST_STABLE_TAG=$(git tag -l "v*" --sort=-version:refname | grep -E "^v[0-9]" | grep -v "beta" | head -n 1 || echo "")
          if [ -n "$LAST_STABLE_TAG" ]; then
            CURRENT="${LAST_STABLE_TAG#v}"
            echo "::notice::Version source: tag $LAST_STABLE_TAG"
          else
            # Read CFBundleShortVersionString without PlistBuddy (Linux runner)
            CURRENT=$(awk '/<key>CFBundleShortVersionString<\/key>/{getline; gsub(/.*<string>|<\/string>.*/,""); print; exit}' "$PLIST" 2>/dev/null || echo "0.0.0")
            [ -z "$CURRENT" ] && CURRENT="0.0.0"
            echo "::notice::Version source: Info.plist ($CURRENT) — no tags found"
          fi
          IFS='.' read -ra V <<< "$CURRENT"

          # Determine bump type from conventional commits since base ref
          COMMITS=$(git log "${BASE_REF}..HEAD" --pretty=format:"%s" --no-merges 2>/dev/null || git log HEAD~10..HEAD --pretty=format:"%s" --no-merges)
          BUMP="patch"
          if echo "$COMMITS" | grep -qE "(BREAKING CHANGE|^[a-z]+(\(.+\))?!:)"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            BUMP="minor"
          fi
          echo "::notice::Bump type: $BUMP"

          case "$BUMP" in
            major) V[0]=$((V[0] + 1)); V[1]=0; V[2]=0 ;;
            minor) V[1]=$((V[1] + 1)); V[2]=0 ;;
            patch) V[2]=$((V[2] + 1)) ;;
          esac

          BASE_VERSION="${V[0]}.${V[1]}.${V[2]}"

          if [ "$IS_BETA" = "true" ] && [ -n "$PR_NUMBER" ]; then
            # v{X.Y.Z}-beta.{PR#}.{n}
            EXISTING=$(git tag -l "v${BASE_VERSION}-beta.${PR_NUMBER}.*" | wc -l | tr -d ' ')
            BETA_NUM=$((EXISTING + 1))
            NEW_VERSION="${BASE_VERSION}-beta.${PR_NUMBER}.${BETA_NUM}"
            echo "::notice::Beta version: $NEW_VERSION"
          else
            NEW_VERSION="$BASE_VERSION"
            # Force mode: increment past any collisions
            if [ "$FORCE_RELEASE" = "true" ]; then
              ATTEMPTS=0
              while git rev-parse "v$NEW_VERSION" >/dev/null 2>&1; do
                ATTEMPTS=$((ATTEMPTS + 1))
                if [ $ATTEMPTS -ge 100 ]; then
                  echo "::error::Could not find available version after 100 attempts"
                  exit 1
                fi
                V[2]=$((V[2] + 1))
                NEW_VERSION="${V[0]}.${V[1]}.${V[2]}"
              done
            fi
            echo "::notice::Stable version: $NEW_VERSION"
          fi

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create tag
        id: tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          IS_BETA: ${{ needs.detect-changes.outputs.is_beta }}
        run: |
          # Race-safe: bail out if the tag already exists (parallel/retried run)
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::warning::Tag $TAG already exists — skipping version job"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "$IS_BETA" = "true" ]; then
            # Beta: just annotate the PR head SHA — no Info.plist change, no commit
            git tag -a "$TAG" -m "Beta release $TAG"
            git push origin "$TAG"
            echo "::notice::Created beta tag $TAG"
          else
            # Stable: bump Info.plist, commit, tag, push both.
            # Portable sed edit (Linux runner) — replaces the <string> on the
            # line after the CFBundleShortVersionString key.
            PLIST="SyncTray/Info.plist"
            sed -i "/<key>CFBundleShortVersionString<\/key>/{n;s|<string>.*</string>|<string>$VERSION</string>|;}" "$PLIST"
            git add "$PLIST"
            git commit -m "chore(release): bump version to $TAG"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin main
            git push origin "$TAG"
            echo "::notice::Created stable release $TAG"
          fi

          echo "created=true" >> "$GITHUB_OUTPUT"

  # ===========================================================================
  # release-macos — build the Release .app, zip it, create the GitHub release,
  # update the homebrew tap, and (stable only) sync Casks/synctray.rb back to
  # the source repo so it stays in lockstep with the tap. macOS is required
  # here for xcodebuild + codesign + notarytool.
  # ===========================================================================
  release-macos:
    needs: [detect-changes, version]
    if: always() && needs.version.outputs.created == 'true'
    runs-on: macos-latest
    # Backstop: build + sign + notarize is normally <10m. Cap well under the
    # 6h default so a hung Apple notary wait can't burn macOS runner minutes.
    timeout-minutes: 45
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.version.outputs.tag }}
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Run release script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          DASH0_AUTH_TOKEN: ${{ secrets.DASH0_AUTH_TOKEN }}
          RELEASE_VERSION: ${{ needs.version.outputs.tag }}
          PR_NUMBER: ${{ needs.detect-changes.outputs.pr_number }}
          IS_BETA: ${{ needs.detect-changes.outputs.is_beta }}
          # Developer ID signing + notarization (optional — release-ci.sh builds
          # unsigned when these are absent). See docs/release-signing.md.
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          NOTARY_KEY_P8_BASE64: ${{ secrets.NOTARY_KEY_P8_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: bash scripts/release-ci.sh

      - name: Sync in-repo cask (stable only)
        if: needs.detect-changes.outputs.is_beta == 'false'
        env:
          VERSION: ${{ needs.version.outputs.version }}
          ZIP_SHA: ${{ env.ZIP_SHA }}
        run: |
          # Move back to main, apply the cask change, push.
          # We arrived here on a detached HEAD at the tag.
          git fetch origin main
          git switch main
          git pull --ff-only origin main

          sed -i '' "s/version \"[^\"]*\"/version \"${VERSION}\"/" Casks/synctray.rb
          sed -i '' "s/sha256 \"[^\"]*\"/sha256 \"${ZIP_SHA}\"/" Casks/synctray.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/synctray.rb
          if git diff --cached --quiet; then
            echo "::notice::Casks/synctray.rb already up to date"
          else
            git commit -m "feat(cask): update SyncTray to version ${VERSION} with new SHA256 checksum"
            git push origin main
          fi

      - name: Comment on PR (beta)
        if: needs.detect-changes.outputs.is_beta == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.version.outputs.version }}';
            const prNumber = '${{ needs.detect-changes.outputs.pr_number }}';
            const body = `## 🧪 Beta Release Published

            **Version:** \`${version}\`

            ### Install
            \`\`\`bash
            brew tap mthines/synctray

            # Latest beta from this PR
            brew install --cask --force mthines/synctray/synctray-beta

            # This exact version (pinned)
            brew install --cask --force mthines/synctray/synctray-beta@${version}
            \`\`\`

            > Beta and stable share \`/Applications/SyncTray.app\`. \`--force\` is required so Homebrew will overwrite the app installed by the other cask. To roll back: \`brew install --cask --force mthines/synctray/synctray\`.

            [View release](https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/v${version})`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(prNumber),
              body: body.split('\n').map(line => line.trim()).join('\n')
            });
